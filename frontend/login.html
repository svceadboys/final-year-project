<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoSort AI Admin</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        body {
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: inherit;
        }

        .login-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 32px;
            display: inline-flex;
            width: 56px;
            height: 56px;
            background: var(--accent);
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            color: #000;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-light);
        }

        .logo-subtext {
            display: block;
            font-size: 13px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-top: 4px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-light);
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 10px;
            border-radius: 8px;
        }

        .error-message {
            color: var(--red);
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo-icon">♻️</div>
            <div class="logo-text">EcoSort AI</div>
            <div class="logo-subtext">Admin Portal</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="username" class="form-control" placeholder="admin@ecosort.com" required
                    autocomplete="username" value="admin@ecosort.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required
                    autocomplete="current-password" value="admin123">
            </div>

            <button type="submit" class="btn btn-primary btn-login" id="loginBtn">Sign In</button>
            <div id="errorMsg" class="error-message">Invalid credentials</div>
        </form>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("loginBtn");
            const error = document.getElementById("errorMsg");
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner" style="width:14px;height:14px;border-width:2px;border-top-color:#fff;"></span> Signing in...`;
            error.style.display = "none";

            try {
                const resp = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (resp.ok) {
                    const data = await resp.json();
                    localStorage.setItem("admin_token", data.access_token);
                    localStorage.setItem("admin_email", u);
                    window.location.href = "index.html";
                } else {
                    error.style.display = "block";
                    const errData = await resp.json();
                    error.innerText = errData.detail || "Authentication failed";
                }
            } catch (err) {
                error.style.display = "block";
                error.innerText = "Network error. Is the server running?";
            } finally {
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        });
    </script>

</body>

</html>
